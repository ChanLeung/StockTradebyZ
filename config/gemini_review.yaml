# gemini_review.yaml
# 兼容旧命名的买入复评配置；推荐改用 config/buy_review.yaml

# 候选列表 JSON
candidates: data/candidates/candidates_latest.json

# 候选图表目录（其下按 pick_date 分目录）
kline_dir: data/kline

# 评分结果输出目录
output_dir: data/review

# 提示词文件
prompt_path: agent/prompts/buy_prompt.md

# 买入复评双模型配置
providers:
  gemini:
    model: gemini-3.1-flash-lite-preview
    weight: 0.5
  openai:
    model: gpt-5.4
    weight: 0.5
    base_url: ""

# 相邻 API 调用间隔（秒）
request_delay: 5

# true: 跳过已存在单股 JSON（断点续跑）
skip_existing: false

# 推荐最小分数门槛
suggest_min_score: 4.0
